<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="admin-container">
        <div class="top-bar">
            <button onclick="goBack()" class="back-btn">
                ← Back to Booking
            </button>
        </div>
        
        <h1>Admin Dashboard</h1>

        <div class="stats">

            <div class="stat-card">
                <h2 id="totalRooms">0</h2>
                <p>Total Rooms</p>
            </div>

            <div class="stat-card">
                <h2 id="availableRooms">0</h2>
                <p>Available Rooms</p>
            </div>

            <div class="stat-card">
                <h2 id="bookedRooms">0</h2>
                <p>Booked Rooms</p>
            </div>

            <div class="stat-card">
                <h2 id="revenue">₹0</h2>
                <p>Revenue</p>
            </div>

        </div>

        <h2>Bookings</h2>

        <div class="search-bar">

            <input type="text" id="searchInput" placeholder="Search Employee, Room, Mobile...">

            <button id="searchBtn">
                Search
            </button>

        </div>

        <table id="bookingsTable">

            <thead>

                <tr>
                    <th>Employee</th>
                    <th>Room</th>
                    <th>Dates</th>
                    <th>Amount</th>
                    <th>Status</th>
                </tr>

            </thead>

            <tbody></tbody>

        </table>

    </div>

    <!-- BOOKING DETAILS MODAL -->

    <div id="bookingModal" class="modal">

        <div class="modal-content">

            <span id="closeModal" class="close">
                &times;
            </span>

            <h2>Booking Details</h2>

            <div id="bookingDetails"></div>

        </div>

    </div>

    <script src="admin.js"></script>

</body>

</html>
