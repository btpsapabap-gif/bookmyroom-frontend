<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Create User</title>

  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="header">
  BookMyRoom - User Administration
</div>

<div class="container">

  <div class="card">

    <h2>Create User</h2>

    <div class="form-group">
      <label>Employee ID</label>
      <input id="employeeId">
    </div>

    <div class="form-group">
      <label>Name</label>
      <input id="employeeName">
    </div>

    <div class="form-group">
      <label>Role</label>
      <select id="role">
        <option value="USER">USER</option>
        <option value="ADMIN">ADMIN</option>
      </select>
    </div>

    <button
      class="btn"
      id="createUserBtn">
      Create User
    </button>

    <button
      class="btn-back"
      onclick="location.href='index.html'">
      Back
    </button>

    <div id="message"></div>

  </div>

</div>

<script src="users.js"></script>

</body>
</html>
